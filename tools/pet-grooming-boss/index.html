<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>老闆私藏儀表板 — 寵美</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, "PingFang TC", "Microsoft JhengHei", sans-serif;
    background: #0f1724;
    color: #e8ecf5;
    line-height: 1.5;
  }
  .app { max-width: 960px; margin: 0 auto; padding: 16px; }

  /* ===== 登入畫面 ===== */
  .login {
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center; padding: 20px;
  }
  .login-card {
    background: #1a2332; border-radius: 14px; padding: 32px;
    width: 100%; max-width: 360px; box-shadow: 0 4px 20px rgba(0,0,0,.3);
  }
  .login h1 { font-size: 22px; margin-bottom: 8px; color: #e8d07a; }
  .login .sub { font-size: 13px; color: #8a9aad; margin-bottom: 24px; }
  .login input {
    width: 100%; font-size: 16px; padding: 12px 14px; margin-bottom: 12px;
    border: 1px solid #2d3b52; border-radius: 8px; background: #0f1724; color: #e8ecf5;
    outline: none;
  }
  .login input:focus { border-color: #e8d07a; }
  .login button {
    width: 100%; padding: 12px; font-size: 16px; font-weight: 600;
    background: #e8d07a; color: #0f1724; border: none; border-radius: 8px; cursor: pointer;
  }
  .login button:hover { background: #f0db8e; }
  .login button:disabled { opacity: .5; cursor: wait; }
  .login .error { color: #ff6b6b; font-size: 13px; margin-top: 8px; min-height: 18px; }

  /* ===== 主儀表板 ===== */
  header { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; padding: 8px 4px 16px; flex-wrap: wrap; }
  h1.title { font-size: 22px; color: #e8d07a; }
  .period-label { font-size: 13px; color: #8a9aad; margin-top: 2px; }
  .header-actions { display: flex; gap: 8px; }
  .icon-btn {
    background: #1a2332; border: 1px solid #2d3b52; color: #e8ecf5;
    padding: 8px 12px; font-size: 14px; border-radius: 8px; cursor: pointer;
  }
  .icon-btn:hover { background: #24324a; }
  .icon-btn:disabled { opacity: .5; cursor: wait; }
  .icon-btn .spin { display: inline-block; }
  .icon-btn.loading .spin { animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .period-tabs {
    display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 20px;
  }
  .period-tabs button {
    flex: 1; min-width: 80px; padding: 10px 8px; font-size: 14px;
    background: #1a2332; color: #8a9aad; border: 1px solid #2d3b52;
    border-radius: 8px; cursor: pointer;
  }
  .period-tabs button.active {
    background: #e8d07a; color: #0f1724; border-color: #e8d07a; font-weight: 700;
  }

  .kpis {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 12px; margin-bottom: 24px;
  }
  .kpi {
    background: #1a2332; border-radius: 12px; padding: 16px;
    border: 1px solid #2d3b52;
  }
  .kpi-label { font-size: 13px; color: #8a9aad; }
  .kpi-value { font-size: 28px; font-weight: 700; color: #e8d07a; margin-top: 4px; font-variant-numeric: tabular-nums; }
  .kpi-value.small { font-size: 22px; color: #a8d8b9; }
  .kpi-sub { font-size: 11px; color: #6a7a8d; margin-top: 2px; }

  section { margin-bottom: 24px; }
  h2 { font-size: 16px; color: #e8ecf5; margin-bottom: 12px; padding-left: 8px; border-left: 3px solid #e8d07a; }

  .card {
    background: #1a2332; border-radius: 12px; padding: 16px;
    border: 1px solid #2d3b52;
  }

  /* bar chart row */
  .bar-row {
    display: grid; grid-template-columns: 100px 1fr 100px;
    gap: 10px; align-items: center; margin-bottom: 10px;
  }
  .bar-row:last-child { margin-bottom: 0; }
  .bar-row .bar-label { font-size: 14px; color: #e8ecf5; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .bar-row .bar-track { background: #2d3b52; border-radius: 4px; height: 18px; overflow: hidden; }
  .bar-row .bar-fill { background: linear-gradient(90deg, #e8d07a, #d4a547); height: 100%; border-radius: 4px; transition: width .4s; }
  .bar-row .bar-value { font-size: 13px; color: #a8d8b9; text-align: right; font-variant-numeric: tabular-nums; }
  .bar-row .bar-value .count { font-size: 11px; color: #6a7a8d; }

  /* recent list */
  .txn {
    display: grid; grid-template-columns: 80px 1fr auto;
    gap: 8px; padding: 10px 0; border-bottom: 1px solid #2d3b52;
    font-size: 14px; align-items: center;
  }
  .txn:last-child { border-bottom: none; }
  .txn .date { color: #8a9aad; font-variant-numeric: tabular-nums; font-size: 12px; }
  .txn .main strong { color: #e8ecf5; }
  .txn .main .sub { color: #8a9aad; font-size: 12px; }
  .txn .amt { color: #e8d07a; font-weight: 600; font-variant-numeric: tabular-nums; }
  .txn .amt .pay { display: block; font-size: 11px; font-weight: 400; color: #6a7a8d; margin-top: 2px; }

  .empty-state { text-align: center; padding: 30px; color: #6a7a8d; font-size: 14px; }
  .error-box { background: #3d1a1a; border: 1px solid #6b2a2a; color: #ffb8b8; padding: 12px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; }

  footer { padding: 20px 4px; font-size: 11px; color: #4a5a6d; text-align: center; }
</style>
</head>
<body>

<!-- ===== 登入畫面 ===== -->
<div id="loginScreen" class="login">
  <div class="login-card">
    <h1>🔐 老闆儀表板</h1>
    <div class="sub">輸入密碼進入</div>
    <input type="password" id="keyInput" placeholder="密碼" autocomplete="off">
    <button id="loginBtn">進入</button>
    <div class="error" id="loginError"></div>
  </div>
</div>

<!-- ===== 主儀表板 ===== -->
<div id="dashboard" class="app" hidden>
  <header>
    <div>
      <h1 class="title">📊 寵美儀表板</h1>
      <div class="period-label" id="periodLabel">—</div>
    </div>
    <div class="header-actions">
      <button id="refreshBtn" class="icon-btn" title="重新整理">
        <span class="spin">🔄</span>
      </button>
      <button id="logoutBtn" class="icon-btn" title="登出">🚪</button>
    </div>
  </header>

  <div class="period-tabs">
    <button data-period="current_month" class="active">本月</button>
    <button data-period="last_month">上月</button>
    <button data-period="current_year">本年</button>
    <button data-period="last_7_days">近 7 天</button>
  </div>

  <div id="errorBox"></div>

  <div class="kpis">
    <div class="kpi"><div class="kpi-label">總營收</div><div class="kpi-value" id="kpiRevenue">—</div></div>
    <div class="kpi"><div class="kpi-label">交易筆數</div><div class="kpi-value" id="kpiCount">—</div></div>
    <div class="kpi"><div class="kpi-label">平均單筆</div><div class="kpi-value" id="kpiAvg">—</div></div>
    <div class="kpi">
      <div class="kpi-label">儲值金池</div>
      <div class="kpi-value small" id="kpiPool">—</div>
      <div class="kpi-sub">全客戶餘額總計</div>
    </div>
  </div>

  <section>
    <h2>美容師業績</h2>
    <div class="card" id="byGroomer"><div class="empty-state">載入中…</div></div>
  </section>

  <section>
    <h2>付款方式</h2>
    <div class="card" id="byPayment"><div class="empty-state">載入中…</div></div>
  </section>

  <section>
    <h2>最近交易</h2>
    <div class="card" id="recent"><div class="empty-state">載入中…</div></div>
  </section>

  <footer>🔒 僅供老闆檢視 · 密碼儲存於此瀏覽器的 localStorage</footer>
</div>

<script>
// ===== 設定 =====
// Apps Script 部署後拿到的 /exec 網址：
const BOSS_API_URL = "";

const STORAGE_KEY = "pet-grooming-boss-key";

// ===== DOM =====
const loginScreen = document.getElementById("loginScreen");
const dashboard = document.getElementById("dashboard");
const keyInput = document.getElementById("keyInput");
const loginBtn = document.getElementById("loginBtn");
const loginError = document.getElementById("loginError");
const refreshBtn = document.getElementById("refreshBtn");
const logoutBtn = document.getElementById("logoutBtn");
const errorBox = document.getElementById("errorBox");
const periodLabel = document.getElementById("periodLabel");
const periodTabs = document.querySelectorAll(".period-tabs button");

// ===== 狀態 =====
let currentPeriod = "current_month";
let currentKey = localStorage.getItem(STORAGE_KEY) || "";

// ===== 啟動 =====
if (currentKey) {
  enterDashboard();
} else {
  showLogin();
}

// ===== 登入 =====
function showLogin() {
  loginScreen.hidden = false;
  dashboard.hidden = true;
  keyInput.focus();
}

async function attemptLogin() {
  const k = keyInput.value.trim();
  if (!k) return;
  loginBtn.disabled = true;
  loginError.textContent = "";
  try {
    const res = await fetchData(k, "current_month");
    if (res.error) {
      loginError.textContent = res.error === "auth_failed" ? "密碼錯誤" : res.error;
      loginBtn.disabled = false;
      return;
    }
    currentKey = k;
    localStorage.setItem(STORAGE_KEY, k);
    enterDashboard(res);
  } catch (err) {
    loginError.textContent = "連線失敗：" + err.message;
    loginBtn.disabled = false;
  }
}

loginBtn.addEventListener("click", attemptLogin);
keyInput.addEventListener("keydown", (e) => { if (e.key === "Enter") attemptLogin(); });

// ===== 儀表板 =====
function enterDashboard(preloaded) {
  loginScreen.hidden = true;
  dashboard.hidden = false;
  if (preloaded) {
    renderAll(preloaded);
  } else {
    loadPeriod(currentPeriod);
  }
}

function logout() {
  localStorage.removeItem(STORAGE_KEY);
  currentKey = "";
  keyInput.value = "";
  loginBtn.disabled = false;
  loginError.textContent = "";
  showLogin();
}
logoutBtn.addEventListener("click", logout);
refreshBtn.addEventListener("click", () => loadPeriod(currentPeriod));

periodTabs.forEach((btn) => {
  btn.addEventListener("click", () => {
    periodTabs.forEach((b) => b.classList.remove("active"));
    btn.classList.add("active");
    currentPeriod = btn.dataset.period;
    loadPeriod(currentPeriod);
  });
});

async function loadPeriod(period) {
  refreshBtn.classList.add("loading");
  refreshBtn.disabled = true;
  errorBox.innerHTML = "";
  try {
    const data = await fetchData(currentKey, period);
    if (data.error) {
      if (data.error === "auth_failed") { logout(); return; }
      throw new Error(data.error);
    }
    renderAll(data);
  } catch (err) {
    errorBox.innerHTML = `<div class="error-box">⚠️ 讀取失敗：${escapeHtml(err.message)}</div>`;
  } finally {
    refreshBtn.classList.remove("loading");
    refreshBtn.disabled = false;
  }
}

async function fetchData(key, period) {
  if (!BOSS_API_URL) {
    throw new Error("尚未設定 BOSS_API_URL，請先部署 Apps Script 並把網址貼進 index.html");
  }
  const url = `${BOSS_API_URL}?key=${encodeURIComponent(key)}&period=${encodeURIComponent(period)}`;
  const res = await fetch(url, { redirect: "follow" });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

// ===== 渲染 =====
function renderAll(d) {
  periodLabel.textContent = d.period ? d.period.label : "";
  document.getElementById("kpiRevenue").textContent = fmtMoney(d.totalRevenue);
  document.getElementById("kpiCount").textContent = (d.transactionCount || 0).toLocaleString();
  document.getElementById("kpiAvg").textContent = fmtMoney(d.avgPerTransaction);
  document.getElementById("kpiPool").textContent = fmtMoney(d.storedValuePool);

  renderBars("byGroomer", d.byGroomer, d.totalRevenue);
  renderBars("byPayment", d.byPayment, d.totalRevenue);
  renderRecent(d.recent);
}

function renderBars(containerId, items, total) {
  const el = document.getElementById(containerId);
  if (!items || items.length === 0) {
    el.innerHTML = `<div class="empty-state">本期無資料</div>`;
    return;
  }
  el.innerHTML = items.map((it) => {
    const pct = total > 0 ? Math.round((it.revenue / total) * 100) : 0;
    return `
      <div class="bar-row">
        <div class="bar-label">${escapeHtml(it.key)}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
        <div class="bar-value">${fmtMoney(it.revenue)}<span class="count">${it.count} 筆 · ${pct}%</span></div>
      </div>`;
  }).join("");
}

function renderRecent(list) {
  const el = document.getElementById("recent");
  if (!list || list.length === 0) {
    el.innerHTML = `<div class="empty-state">本期無交易</div>`;
    return;
  }
  el.innerHTML = list.map((r) => `
    <div class="txn">
      <div class="date">${escapeHtml(r.date.slice(5))}</div>
      <div class="main">
        <strong>${escapeHtml(r.ownerName || "(無姓名)")}</strong> · ${escapeHtml(r.petName || "")}
        <div class="sub">${escapeHtml(r.service || "")}${r.groomer ? " · " + escapeHtml(r.groomer) : ""}</div>
      </div>
      <div class="amt">${fmtMoney(r.amount)}<span class="pay">${escapeHtml(r.payment || "")}</span></div>
    </div>
  `).join("");
}

// ===== 工具 =====
function fmtMoney(n) {
  return "NT$ " + (Number(n) || 0).toLocaleString();
}
function escapeHtml(s) {
  return String(s == null ? "" : s).replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}
</script>
</body>
</html>
